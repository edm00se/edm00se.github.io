name: Combine PRs

on:
  schedule:
    - cron: '0 1 * * 3' # Wednesday at 01:00
  workflow_dispatch: # allows you to manually trigger the workflow

# The minimum permissions required to run this Action
permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: upgrade-dependencies
  cancel-in-progress: true

jobs:
  combine-prs:
    uses: edm00se/edm00se/.github/workflows/combine-prs.yml@master
    secrets: inherit
